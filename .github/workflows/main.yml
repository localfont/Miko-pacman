name: Build Standalone Pacman for MikoOS

on:
  workflow_dispatch:

jobs:
  build-pacman:
    runs-on: ubuntu-latest
    steps:
      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential meson ninja-build git \
            libarchive-dev libcurl4-openssl-dev libssl-dev libgpgme-dev \
            pkg-config asciidoc

      - name: Clone Pacman Source
        run: |
          git clone https://gitlab.archlinux.org/pacman/pacman.git
          cd pacman

      - name: Patch Binary Name (pacman → miko)
        run: |
          cd pacman
          # Kaynak kodda "pacman" ismini "miko" olarak değiştir
          find src/ -name "*.c" | xargs sed -i 's/argv\[0\], "pacman"/argv[0], "miko"/g'
          # Kullanıcıya gösterilen mesajlardaki "pacman" → "miko"
          find src/ -name "*.c" | xargs sed -i 's/"pacman"/"miko"/g'
          find lib/ -name "*.c" | xargs sed -i 's/"pacman"/"miko"/g'

      - name: Configure and Build
        run: |
          cd pacman
          meson setup build \
            --prefix=/usr \
            --sysconfdir=/etc \
            --localstatedir=/var \
            -Ddoc=disabled \
            -Dgpgme=disabled \
            -Dscriptlet-shell=/bin/sh
          ninja -C build

      - name: Package Miko Binaries
        run: |
          mkdir -p mikoos-pacman/usr/bin
          mkdir -p mikoos-pacman/etc
          # Binary'yi "miko" adıyla kopyala
          cp pacman/build/src/pacman/pacman mikoos-pacman/usr/bin/miko
          cp pacman/build/src/pacman/pacman mikoos-pacman/usr/bin/pacman  # compat symlink
          # pacman.conf
          cat > mikoos-pacman/etc/pacman.conf << 'EOF'
          [options]
          Architecture = auto
          SigLevel = Optional TrustAll
          
          [core]
          Server = https://mirror.rackspace.com/archlinux/$repo/os/$arch
          
          [extra]
          Server = https://mirror.rackspace.com/archlinux/$repo/os/$arch
          EOF

      - name: Upload Miko Binary
        uses: actions/upload-artifact@v4
        with:
          name: standalone-miko
          path: mikoos-pacman/
